services:
  - type: web
    name: reposearch-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: ENABLE_RERANKER
        value: "false" 
      - key: GROQ_API_KEY
        sync: false         
      - key: LANGCHAIN_API_KEY
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_HOST
        sync: false